version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wakanda-postgres-main
    environment:
      POSTGRES_INITDB_ARGS: "-c password_encryption=scram-sha-256"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/priv/repo/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U national_Unity -d wakanda_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wakanda_network

  postgres_replica:
    image: postgres:16-alpine
    container_name: wakanda-postgres-replica
    environment:
      POSTGRES_INITDB_ARGS: "-c password_encryption=scram-sha-256"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./backend/priv/repo/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U national_Unity -d wakanda_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wakanda_network

  cockroachdb-1:
    image: cockroachdb/cockroach:v23.2.0
    container_name: wakanda-cockroachdb-1
    command: start --insecure --listen-addr=:26257 --http-addr=:8080 --join=cockroachdb-1:26257,cockroachdb-2:26257,cockroachdb-3:26257 --store=/cockroach/cockroach-data
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach_data_1:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      wakanda_network:
        aliases:
          - cockroachdb-1

  cockroachdb-2:
    image: cockroachdb/cockroach:v23.2.0
    container_name: wakanda-cockroachdb-2
    command: start --insecure --listen-addr=:26257 --http-addr=:8080 --join=cockroachdb-1:26257,cockroachdb-2:26257,cockroachdb-3:26257 --store=/cockroach/cockroach-data
    ports:
      - "26258:26257"
      - "8081:8080"
    volumes:
      - cockroach_data_2:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      wakanda_network:
        aliases:
          - cockroachdb-2

  cockroachdb-3:
    image: cockroachdb/cockroach:v23.2.0
    container_name: wakanda-cockroachdb-3
    command: start --insecure --listen-addr=:26257 --http-addr=:8080 --join=cockroachdb-1:26257,cockroachdb-2:26257,cockroachdb-3:26257 --store=/cockroach/cockroach-data
    ports:
      - "26259:26257"
      - "8082:8080"
    volumes:
      - cockroach_data_3:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      wakanda_network:
        aliases:
          - cockroachdb-3

volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  cockroach_data_1:
    driver: local
  cockroach_data_2:
    driver: local
  cockroach_data_3:
    driver: local

networks:
  wakanda_network:
    driver: bridge
