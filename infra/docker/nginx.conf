events {
    worker_connections 1024;
}

http {
    upstream knowledge_hub {
        server knowledge-hub:8001;
    }
    
    upstream finance {
        server finance:8002;
    }
    
    upstream minerals {
        server minerals:8003;
    }
    
    upstream drones {
        server drones:8004;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Main server block
    server {
        listen 80;
        server_name localhost;

        # API Gateway routes
        location /api/knowledge/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://knowledge_hub/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/finance/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://finance/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/minerals/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://minerals/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/drones/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://drones/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for drones telemetry
        location /api/drones/ws/ {
            proxy_pass http://drones;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Default route
        location / {
            return 200 '{"service": "Wakanda Protocol API Gateway", "status": "healthy", "version": "1.0.0"}';
            add_header Content-Type application/json;
        }
    }

    # HTTPS server (if SSL certificates are available)
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # Include all the location blocks from above
    # }
}