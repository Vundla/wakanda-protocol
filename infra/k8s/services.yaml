apiVersion: v1
kind: Namespace
metadata:
  name: wakanda-protocol
---
# Knowledge Hub Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-hub
  namespace: wakanda-protocol
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-hub
  template:
    metadata:
      labels:
        app: knowledge-hub
    spec:
      containers:
      - name: knowledge-hub
        image: wakanda/knowledge-hub:latest
        ports:
        - containerPort: 8001
        env:
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: wakanda-secrets
              key: openrouter-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-hub-service
  namespace: wakanda-protocol
spec:
  selector:
    app: knowledge-hub
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
---
# Finance Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance
  namespace: wakanda-protocol
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance
  template:
    metadata:
      labels:
        app: finance
    spec:
      containers:
      - name: finance
        image: wakanda/finance:latest
        ports:
        - containerPort: 8002
        env:
        - name: MASTERCARD_API_URL
          value: "https://sandbox.api.mastercard.com"
        - name: MASTERCARD_CONSUMER_KEY
          valueFrom:
            secretKeyRef:
              name: wakanda-secrets
              key: mastercard-consumer-key
        - name: MASTERCARD_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: wakanda-secrets
              key: mastercard-private-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: wakanda-protocol
spec:
  selector:
    app: finance
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
---
# Minerals Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minerals
  namespace: wakanda-protocol
spec:
  replicas: 2
  selector:
    matchLabels:
      app: minerals
  template:
    metadata:
      labels:
        app: minerals
    spec:
      containers:
      - name: minerals
        image: wakanda/minerals:latest
        ports:
        - containerPort: 8003
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
        livenessProbe:
          httpGet:
            path: /
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: minerals-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minerals-service
  namespace: wakanda-protocol
spec:
  selector:
    app: minerals
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
---
# Drones Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drones
  namespace: wakanda-protocol
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drones
  template:
    metadata:
      labels:
        app: drones
    spec:
      containers:
      - name: drones
        image: wakanda/drones:latest
        ports:
        - containerPort: 8004
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: drones-service
  namespace: wakanda-protocol
spec:
  selector:
    app: drones
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
---
# API Gateway (NGINX Ingress)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wakanda-ingress
  namespace: wakanda-protocol
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  rules:
  - host: wakanda-protocol.local
    http:
      paths:
      - path: /api/knowledge(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: knowledge-hub-service
            port:
              number: 8001
      - path: /api/finance(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: finance-service
            port:
              number: 8002
      - path: /api/minerals(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: minerals-service
            port:
              number: 8003
      - path: /api/drones(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: drones-service
            port:
              number: 8004
---
# Persistent Volume Claim for minerals models
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minerals-models-pvc
  namespace: wakanda-protocol
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi