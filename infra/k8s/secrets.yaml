apiVersion: v1
kind: Secret
metadata:
  name: wakanda-secrets
  namespace: wakanda-protocol
type: Opaque
data:
  # Base64 encoded values - replace with actual secrets
  openrouter-api-key: ""
  mastercard-consumer-key: ""
  mastercard-private-key: ""
  postgres-password: d2FrYW5kYV9wYXNzd29yZA== # "wakanda_password"
  grafana-password: YWRtaW4= # "admin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wakanda-config
  namespace: wakanda-protocol
data:
  environment: "production"
  log_level: "INFO"
  mastercard_api_url: "https://api.mastercard.com"
  
  # PostgreSQL configuration
  postgres_host: "postgres-service"
  postgres_port: "5432"
  postgres_database: "wakanda"
  postgres_user: "wakanda_user"
  
  # Redis configuration
  redis_host: "redis-service"
  redis_port: "6379"